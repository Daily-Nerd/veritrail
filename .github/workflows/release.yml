name: release

on:
  push:
    branches: [main]
  # Manual escape hatch: publish a specific tag to npm with provenance.
  # Used to recover a release whose in-run publish was missed, or to re-publish.
  workflow_dispatch:
    inputs:
      publish_ref:
        description: "Git tag to build and publish to npm (e.g. v0.2.0)"
        required: true

permissions:
  contents: write
  pull-requests: write

jobs:
  # 1. Maintain the release PR. On its merge, cut the npm (ts) tag v<version> +
  #    GitHub Release. The Go module tag is minted separately (job 3).
  #    Only runs on push to main; skipped on manual dispatch.
  release-please:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      releases_created: ${{ steps.rp.outputs.releases_created }}
      ts_version: ${{ steps.rp.outputs['ts--version'] }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: rp
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  # 2. Publish the npm package.
  #    Fires automatically when a release is cut, OR manually via workflow_dispatch
  #    against a given tag. Auth is OIDC trusted publishing (no NPM_TOKEN) —
  #    provenance is attested. Requires a trusted publisher registered on npm
  #    for this repo + this workflow file.
  publish-npm:
    needs: release-please
    if: ${{ always() && (needs.release-please.outputs.releases_created == 'true' || github.event_name == 'workflow_dispatch') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # mint OIDC token for npm provenance
    steps:
      - uses: actions/checkout@v4
        with:
          # On manual dispatch, build the requested tag; otherwise the pushed ref.
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.publish_ref || github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      # OIDC trusted publishing + provenance needs npm >= 11.5.1;
      # the runner ships an older npm, so upgrade first.
      - name: Upgrade npm (OIDC support)
        run: npm install -g npm@latest

      - name: Build
        run: |
          cd ts
          npm ci
          npm run build

      - name: Publish (trusted publishing + provenance)
        run: |
          cd ts
          npm publish --provenance --access public

  # 3. Mint the matching Go module tag. A Go release is just a tag (no version
  #    file, no publish), so the workflow creates go/v<version> on the same commit
  #    release-please tagged as v<version> — keeping the Go module and the npm
  #    package in lockstep. release-please's go release-type can't be given a
  #    component name, so it can't emit the go/ tag prefix itself (it collided
  #    with the ts v* tag); minting it here is deterministic.
  tag-go:
    needs: release-please
    if: ${{ needs.release-please.outputs.releases_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Tag and release the Go module
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.release-please.outputs.ts_version }}
        run: |
          tag="go/v${VERSION}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$tag" "${GITHUB_SHA}"
          git push origin "$tag"
          gh release create "$tag" \
            --title "$tag" \
            --notes "Go module release tracking @daily-nerd/veritrail@${VERSION}. Changelog: ts/CHANGELOG.md."
